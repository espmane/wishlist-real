<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Wishlist - Tilføj ønskeliste</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5" th:object="${wishlist}">
    <h1 class="text-center mb-4">Tilføj ønskeliste</h1>

    <form th:action="@{/save}" method="post">
        <input type="hidden" th:field="*{userId}" />

        <!-- Navn på liste -->
        <div class="mb-4">
            <label class="form-label">Navn på ønskeliste</label>
            <input type="text" th:field="*{name}" class="form-control" required>
        </div>

        <!-- Wishes container -->
        <div id="wishes-container">

            <!-- En wish -->
            <div class="card mb-3 p-3" th:each="wish, iterStat : *{wishes}">
                <div class="row">

                    <div class="col-md-4">
                        <label>Navn</label>
                        <input type="text"
                               th:name="'wishes[' + ${iterStat.index} + '].name'"
                               th:value="${wish.name}"
                               class="form-control"
                               placeholder="Produkt navn"
                               required>
                    </div>

                    <div class="col-md-4">
                        <label>Link</label>
                        <input type="text"
                               th:name="'wishes[' + ${iterStat.index} + '].link'"
                               th:value="${wish.link}"
                               class="form-control"
                               placeholder="https://...">
                    </div>

                    <div class="col-md-4">
                        <label>Pris</label>
                        <input type="number"
                               th:name="'wishes[' + ${iterStat.index} + '].price'"
                               th:value="${wish.price}"
                               class="form-control"
                               placeholder="DKK">
                    </div>

                </div>
            </div>

        </div>

        <!-- Add button -->
        <button type="button" onclick="addWish()" class="btn btn-outline-secondary mb-3">
            ➕ Tilføj ønske
        </button>

        <br>

        <button type="submit" class="btn btn-outline-primary">Gem</button>
    </form>
</div>

<script>
    function addWish() {
        const container = document.getElementById('wishes-container');
        const index = container.children.length;

        const card = document.createElement('div');
        card.className = "card mb-3 p-3";

        card.innerHTML = `
            <div class="row">
                <div class="col-md-4">
                    <label>Navn</label>
                    <input type="text" name="wishes[${index}].name" class="form-control" required>
                </div>

                <div class="col-md-4">
                    <label>Link</label>
                    <input type="text" name="wishes[${index}].link" class="form-control">
                </div>

                <div class="col-md-4">
                    <label>Pris</label>
                    <input type="number" name="wishes[${index}].price" class="form-control">
                </div>
            </div>
        `;

        container.appendChild(card);
    }
</script>

</body>
</html>
